{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCORO 管理画面</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 管理画面専用CSS -->
  <link rel="stylesheet" href="{% static 'manager.css' %}">
</head>

<body class="bg-light">

  <!-- 店側ナビバー -->
  <nav class="navbar navbar-dark locoro-manager-navbar mb-4">
    <div class="container-fluid d-flex justify-content-between">

      <!-- 左側：タイトル -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'core:manager_dashboard' %}">
      <img
        src="{% static 'images/locoro-logo.png' %}"
        alt="LOCORO"
        class="locoro-navbar-logo"
      />
    </a>


      <!-- 右側：ホテル名 + 管理メニュー -->
      <div class="d-flex align-items-center gap-3">

        <!-- ホテル名 -->
        <span class="text-white-50 small">
          {{ request.user.staff_profile.hotel.name }}
        </span>

        <!-- 管理メニュードロップダウン -->
        <div class="dropdown">
          <button
            class="btn btn-outline-light btn-sm dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            管理メニュー
          </button>

          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="{% url 'core:manager_hotel_settings' %}">
                店舗情報を編集
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            {# ログアウト導線がある場合のみ有効化 #}
          
            <li>
              <a class="dropdown-item text-danger" href="{% url 'core:logout' %}">
                ログアウト
              </a>
            </li>
            
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  {% block extra_js %}
  {% endblock %}

</body>
</html>
