{% extends "base.html" %}

{% block title %}ホテル一覧{% endblock %}

{% block content %}
<h1 class="mb-4">ホテル一覧</h1>

<div class="row">
  {% for hotel in hotels %}
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm h-100">
        {% if hotel.image %}
          <img src="{{ hotel.image.url }}" class="card-img-top" alt="{{ hotel.name }}">
        {% endif %}

        <div class="card-body">
          <h5 class="card-title">{{ hotel.name }}</h5>
          <p class="card-text">
            {{ hotel.address|default:"住所未登録" }}
          </p>

          <!-- 次のステップでここを生かす -->
          <a href="{% url 'core:hotel_room_list' hotel.id %}" class="btn btn-outline-primary btn-sm">
            部屋一覧を見る
          </a>

        </div>
      </div>
    </div>
  {% empty %}
    <p>表示できるホテルがありません。</p>
  {% endfor %}
</div>
{% endblock %}
