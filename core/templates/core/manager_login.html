{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCORO 管理画面ログイン</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'manager.css' %}">
</head>
<body class="manager-login-page">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="manager-login-card">

                    <div class="manager-login-brand">
                        <img src="{% static 'images/locoro-logo.png' %}" alt="LOCORO" class="manager-login-logo">
                        <h1 class="manager-login-title">ホテル管理ログイン</h1>
                        <p class="manager-login-subtitle">
                            管理画面にログインして客室状態やホテル情報を更新できます
                        </p>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger manager-login-alert" role="alert">
                        ユーザー名またはパスワードが正しくありません。
                    </div>
                    {% endif %}

                    {% if next %}
                    <p class="text-muted small text-center mb-3">
                        ログイン後に続きの画面へ移動します。
                    </p>
                    {% endif %}

                    <form method="post" class="manager-login-form">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label">ユーザー名</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-4">
                            <label for="{{ form.password.id_for_label }}" class="form-label">パスワード</label>
                            {{ form.password }}
                        </div>

                        <button type="submit" class="btn manager-login-button w-100">
                            ログイン
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
