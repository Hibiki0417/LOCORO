<!DOCTYPE html>
<html lang="ja">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}LOCORO{% endblock %}</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"

    ><!--CSSを読み込む -->
    <link rel="stylesheet" href="{% static 'locoro.css' %}">
</head>
<body>

    <!-- Navbar（必要なら後で変更できる）-->
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'core:room_list' %}">
            <img
                src="{% static 'images/locoro-logo.png' %}"
                alt="LOCORO"
                height="32"
                class="d-inline-block align-text-top"
            >
        </a>

      </div>
    </nav>

    <div class="container">
        {% block content %}
        <!-- 各ページがここに入る -->
        {% endblock %}
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
